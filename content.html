
<div id='dumbo-snake-root' style='text-align:center; background:#111; color:#fff; font-family:sans-serif; padding:20px; border-radius:10px; max-width:400px; margin: auto; user-select: none;'>
    <h3 style='color:#fff;'>🐘 Dumbo's Snake 🐍</h3>
    <canvas id='snakeGame' width='300' height='300' style='border:2px solid #555; background:#000; display: block; margin: auto;'></canvas>
    <div id='score' style='margin-top:10px; font-size:20px; color:#fff;'>Score: 0</div>
    
    <!-- Mobile Controls -->
    <div style='margin-top:15px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; max-width: 180px; margin-left: auto; margin-right: auto;'>
        <div></div><button onclick="window.dumboSetDir('UP')" style='padding:15px; background:#444; color:#fff; border:none; border-radius:5px;'>▲</button><div></div>
        <button onclick="window.dumboSetDir('LEFT')" style='padding:15px; background:#444; color:#fff; border:none; border-radius:5px;'>◀</button>
        <button onclick="window.dumboSetDir('DOWN')" style='padding:15px; background:#444; color:#fff; border:none; border-radius:5px;'>▼</button>
        <button onclick="window.dumboSetDir('RIGHT')" style='padding:15px; background:#444; color:#fff; border:none; border-radius:5px;'>▶</button>
    </div>

    <script>
        (function() {
            console.log('Dumbo Snake Loading...');
            const canvas = document.getElementById('snakeGame');
            if(!canvas) { console.error('Canvas not found'); return; }
            const ctx = canvas.getContext('2d');
            const box = 15;
            let score = 0;
            let snake = [{x: 9 * box, y: 10 * box}];
            let food = {x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box};
            let d;

            window.dumboSetDir = function(dir) {
                if(dir == 'LEFT' && d != 'RIGHT') d = 'LEFT';
                else if(dir == 'UP' && d != 'DOWN') d = 'UP';
                else if(dir == 'RIGHT' && d != 'LEFT') d = 'RIGHT';
                else if(dir == 'DOWN' && d != 'UP') d = 'DOWN';
            };

            function direction(event) {
                if(event.keyCode == 37 && d != 'RIGHT') d = 'LEFT';
                else if(event.keyCode == 38 && d != 'DOWN') d = 'UP';
                else if(event.keyCode == 39 && d != 'LEFT') d = 'RIGHT';
                else if(event.keyCode == 40 && d != 'UP') d = 'DOWN';
            }
            document.addEventListener('keydown', direction);

            function draw() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                for(let i = 0; i < snake.length; i++) {
                    ctx.fillStyle = (i == 0) ? '#4CAF50' : '#8BC34A';
                    ctx.fillRect(snake[i].x, snake[i].y, box, box);
                }
                ctx.fillStyle = 'red';
                ctx.fillRect(food.x, food.y, box, box);
                let snakeX = snake[0].x;
                let snakeY = snake[0].y;
                if( d == 'LEFT') snakeX -= box;
                if( d == 'UP') snakeY -= box;
                if( d == 'RIGHT') snakeX += box;
                if( d == 'DOWN') snakeY += box;
                if(snakeX == food.x && snakeY == food.y) {
                    score++;
                    document.getElementById('score').innerHTML = 'Score: ' + score;
                    food = {x: Math.floor(Math.random() * 19 + 1) * box, y: Math.floor(Math.random() * 19 + 1) * box};
                } else {
                    snake.pop();
                }
                let newHead = {x: snakeX, y: snakeY};
                if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                    clearInterval(gameLoop);
                    alert('Game Over! Score: ' + score);
                    snake = [{x: 9 * box, y: 10 * box}];
                    d = null;
                    score = 0;
                    document.getElementById('score').innerHTML = 'Score: 0';
                    gameLoop = setInterval(draw, 100);
                }
                snake.unshift(newHead);
            }
            function collision(head, array) {
                for(let i = 0; i < array.length; i++) {
                    if(head.x == array[i].x && head.y == array[i].y) return true;
                }
                return false;
            }
            let gameLoop = setInterval(draw, 100);
        })();
    </script>
</div>
